<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Apna Pharma - Pharmacovigilance Course</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0066cc;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.search{
padding:15px;
background:white;
}

.search input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.container{
display:flex;
height:calc(100vh - 120px);
}

.sidebar{
width:280px;
overflow:auto;
background:white;
border-right:1px solid #ddd;
}

.chapter{
padding:15px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.chapter:hover{
background:#eef6ff;
}

.content{
flex:1;
padding:20px;
overflow:auto;
background:#fafafa;
}

.content h2{
margin-bottom:15px;
color:#0066cc;
}

.nav{
display:flex;
justify-content:space-between;
margin-top:40px;
}

button{
padding:12px 18px;
border:none;
background:#0066cc;
color:white;
border-radius:8px;
cursor:pointer;
}

@media(max-width:768px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
height:220px;
}

}
</style>
</head>

<body>

<header>
Apna Pharma - Pharmacovigilance
</header>

<div class="search">
<input type="text" placeholder="Search Chapter...">
</div>

<div class="container">

<div class="sidebar">

<div class="chapter">Chapter 1</div>
<div class="chapter">Chapter 2</div>
<div class="chapter">Chapter 3</div>
<div class="chapter">Chapter 4</div>
<div class="chapter">Chapter 5</div>

</div>

<div class="content">

<h2>Welcome</h2>

<p>
Welcome to the Pharmacovigilance Course.
</p>

<div class="nav">
<button>Previous</button>
<button>Next</button>
</div>

</div>

</div>

</body>
</html>
